<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Message Sent | Tupou College</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

<style>

body{
font-family:'Poppins',sans-serif;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(135deg,#0d6efd,#4facfe);
}

/* Glass Card */

.success-card{
background:rgba(255,255,255,0.9);
backdrop-filter:blur(10px);
border-radius:20px;
padding:50px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
text-align:center;
max-width:450px;
animation:fadeIn 1s ease;
}

/* Success Icon */

.success-icon{
font-size:90px;
color:#28a745;
animation:pop 0.6s ease;
}

/* Button */

.btn-home{
padding:10px 25px;
font-weight:500;
transition:0.3s;
}

.btn-home:hover{
transform:scale(1.08);
box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

/* Animations */

@keyframes pop{
0%{transform:scale(0)}
80%{transform:scale(1.2)}
100%{transform:scale(1)}
}

@keyframes fadeIn{
from{opacity:0; transform:translateY(20px);}
to{opacity:1; transform:translateY(0);}
}

</style>

</head>

<body>

<div class="success-card">

<div class="success-icon">✔</div>

<h2 class="mt-3">Message Received!</h2>

<p class="text-muted mt-2">
Thank you for contacting Tupou College Toloa.  
Our team will respond to your message shortly.
</p>

<a href="index.html" class="btn btn-primary btn-home mt-3">
Return Home
</a>

</div>

</body>

</html>
